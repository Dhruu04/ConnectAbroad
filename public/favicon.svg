<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Soft warm cream background circle to make it pop and look premium in dark/light browser tabs -->
  <circle cx="50" cy="50" r="48" fill="#FCFAF6" stroke="#EAE6DF" stroke-width="1" />
  
  <!-- Globe skeleton in background (charcoal color with low opacity) -->
  <circle cx="50" cy="50" r="34" stroke="#353230" stroke-width="2.5" stroke-linecap="round" opacity="0.15" />
  <ellipse cx="50" cy="50" rx="14" ry="34" stroke="#353230" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.2" />
  <line x1="16" y1="50" x2="84" y2="50" stroke="#353230" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.2" />
  
  <!-- Curved Connection Arc path (warm terracotta color) -->
  <path d="M 34,66 C 34,44 56,34 66,34" stroke="#AD4C37" stroke-width="3.5" stroke-linecap="round" fill="none" />
  
  <!-- Hometown Node (charcoal color representing point of origin) -->
  <circle cx="34" cy="66" r="5" fill="#353230" />
  
  <!-- Destination/New City Node (terracotta color representing landing destination) -->
  <circle cx="66" cy="34" r="5.5" fill="#AD4C37" />
  <circle cx="66" cy="34" r="9" stroke="#AD4C37" stroke-width="1.5" stroke-dasharray="2 2" />
</svg>
